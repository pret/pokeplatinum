[constants]
toolchain = '@GLOBAL_SOURCE_ROOT@' / 'tools' / 'metroskrew' / 'bin'

[binaries]
c      = [toolchain / 'mwccarm',  '-wrap:sdk', '2.0/sp2p2']
c_ld   = [toolchain / 'mwldarm',  '-wrap:sdk', '2.0/sp2p2']
cpp    = [toolchain / 'mwccarm',  '-wrap:sdk', '2.0/sp2p2']
cpp_ld = [toolchain / 'mwldarm',  '-wrap:sdk', '2.0/sp2p2']
nasm   = [toolchain / 'mwasmarm', '-wrap:sdk', '2.0/sp2p2']
ar     = [toolchain / 'mwldarm',  '-wrap:sdk', '2.0/sp2p2']
strip   = ['false']

[host_machine]
system      = 'bare metal'
cpu_family  = 'arm'
cpu         = 'arm'
endian      = 'little'
